defaults:
  - dataset: chexpert_plus
  - backbone: rad_dino
  - experiment: in_dist
  - _self_

seed: 42
data_root: ${oc.env:RADGAP_DATA_ROOT}   # chemin machine-specific via env var, jamais committé
output_dir: experiments/${experiment.name}/${backbone.name}/${dataset.name}
uncertainty_policy: auto                 # auto = défaut par pathologie | u_zeros | u_ones | ignore
label_section: impression                # section CheXbert : impression (défaut) | findings | report

wandb:
  project: radgap
  mode: offline
